<!DOCTYPE html>
<html lang="fr">
<head>

  <link rel="stylesheet" href="ressources/styles/style.css">
  <style>
    body { font-family: sans-serif; text-align: center; padding: 3rem 1rem; background: #f5f7fa; }
    .offline-box { max-width: 420px; margin: 0 auto; background: #fff; border-radius: 10px; padding: 2rem; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
    h1 { color: #2474d6; }
    p { color: #555; line-height: 1.6; }

  </style>
</head>
<body>
  <div class="offline-box">
    <h1>Vous êtes hors ligne</h1>

    <p>Les dernières données de température en cache restent disponibles sur la page d'accueil.</p>
    <a href="/index.html" class="button">Retour à l'accueil</a>
