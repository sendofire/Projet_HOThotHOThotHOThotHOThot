<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>TP2</title>
        <link rel="stylesheet" href="ressources/styles/style.css">
    </head>
    <body>
        <header>
            <h1>
                Systeme de temperature
            </h1>

            <div>
                <div>
                    <button class="button"><a href="ressources/pages/account.html">Account</a></button>
                </div>
                <!-- Système d'onglets accessible avec ARIA -->
                <div role="tablist" class="manual" aria-label="Panneaux de température">
                <button role="tab"
                        id="btnTempsReel"
                        class="active"
                        aria-selected="true"
                        aria-controls="tempsReel"
                        tabindex="0">
                    Temps Réel
                </button>

                <button role="tab"
                        id="btnHistorique"
                        aria-selected="false"
                        aria-controls="historique"
                        tabindex="1">
                    Historique
                </button>

                <button role="tab"
                        id="btnDocumentation"
                        aria-selected="false"
                        aria-controls="documentation"
                        tabindex="2">
                    Documentation
                </button>
                </div>
            </div>
            <hr>
        </header>
        <main>
            <!-- Panneau 1: Temps Réel -->
            <div id="tempsReel"
                 role="tabpanel"
                 aria-labelledby="btnTempsReel"
                 tabindex="0">
                <h2>
                    Temperature:
                </h2>
                <h3>
                    extérieur
                </h3>
                <p id="case" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                <div id="avertTemp" role="alert">
                    <p id="funny_sentence" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                </div>
                <h3>
                    intérieur
                </h3>
                <p id="case_int" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                <div id="avertTemp" role="alert">
                    <p id="funny_sentence_int" aria-live="polite" aria-atomic="true" aria-relevant="all"></p>
                </div>

            </div>

            <!-- Panneau 2: Historique -->
            <div id="historique"
                 role="tabpanel"
                 aria-labelledby="btnHistorique"
                 tabindex="0"
                 class="is-hidden">
                <h2>
                    Historique des temperatures:
                </h2>
                <h3>
                    extérieur
                </h3>
                <div class="chart-container">
                    <canvas id="myChart" aria-label="Histogramme des températures extérieures" role="img"></canvas>
                    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                </div>
                <p id="listeHistorique" aria-live="polite" aria-atomic="true" aria-relevant="all">

                </p>
                <h3>
                    intérieur
                </h3>
                <div class="chart-container">
                    <canvas id="myChart__int" aria-label="Histogramme des températures intérieures" role="img"></canvas>
                    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
                </div>
                <p id="listeHistorique" aria-live="polite" aria-atomic="true" aria-relevant="all">
                </p>
            </div>
        </main>
        <script src="https://cdn.jsdelivr.net/npm/chart.js" integrity="sha384-1oM1DKD8kSRaYlZ0W/77KS5wP0kjvz4alkM5lAgnXtt0MZf0YrwkB5U+Q0t+zQ0R" crossorigin="anonymous"></script>
        <script type="module" src="ressources/scripts/main.js"></script>
    </body>
</html>
